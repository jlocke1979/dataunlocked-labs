<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transplant System Sites — Volume by Geography</title>
    <link rel="stylesheet" href="styles.css?v=20260523-26" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 id="chart-title">Transplant System Sites</h1>
        <p class="subtitle">Loading map…</p>
      </header>

      <div class="viz-card">
        <div class="viz-layout">
          <div
            id="chart"
            class="chart-map"
            aria-label="Flow map visualization"
          ></div>
          <aside id="legend-panel" class="legend-panel" aria-label="Legend">
            <h2 class="legend-panel__title">Legend</h2>

            <section class="legend-section legend-section--flows">
              <h3 class="legend-section__heading">Flow volume (transplants)</h3>
              <div class="legend-flow-scale">
                <div class="legend-flow-row">
                  <span class="legend-line legend-line--high"></span>
                  <span class="legend-flow-label">Higher volume</span>
                </div>
                <div class="legend-flow-row">
                  <span class="legend-line legend-line--mid"></span>
                  <span class="legend-flow-label">Medium volume</span>
                </div>
                <div class="legend-flow-row">
                  <span class="legend-line legend-line--low"></span>
                  <span class="legend-flow-label">Lower volume</span>
                </div>
              </div>
              <p class="legend-flow-direction legend-flow-label"></p>
            </section>

            <section class="legend-section legend-section--hubs">
              <h3 class="legend-section__heading">Transplant centers</h3>
              <div class="legend-hub-scale">
                <div class="legend-hub-row">
                  <svg class="legend-hub-svg" width="40" height="28" aria-hidden="true">
                    <circle class="legend-hub legend-hub--low" cx="10" cy="14" r="4"></circle>
                  </svg>
                  <span class="legend-flow-label">Lower volume</span>
                </div>
                <div class="legend-hub-row">
                  <svg class="legend-hub-svg" width="40" height="28" aria-hidden="true">
                    <circle class="legend-hub legend-hub--high" cx="14" cy="14" r="8"></circle>
                  </svg>
                  <span class="legend-flow-label">Higher volume</span>
                </div>
              </div>
              <p class="legend-hub-note">Circle size = transplant center volume</p>
            </section>
          </aside>
        </div>

        <p class="viz-source">Source: OPTN/UNOS Advanced Reports, 2025.</p>
        <p class="viz-notes" hidden></p>
      </div>

      <section
        id="audit-notes-panel"
        class="audit-notes-panel"
        hidden
        aria-label="Audit notes"
      >
        <details class="audit-notes-panel__details">
          <summary class="audit-notes-panel__summary">Audit notes</summary>
          <div class="audit-notes-panel__body"></div>
        </details>
      </section>

      <section id="audit-panel" class="audit-panel" aria-label="Audit (internal)">
        <h2 class="audit-panel__heading">Audit (internal)</h2>
        <div class="audit-panel__body">
          <ul class="audit-list"></ul>
        </div>
      </section>
    </main>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <script type="module" src="main.js?v=20260604-9"></script>
  </body>
</html>
