<!doctype html>
<html>

<head>
<meta charset="utf-8">
<title>Season Pass Decision Engine</title>


<!--  LOAD D3 FIRST -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body{
  font-family:system-ui;
  padding:40px;
  max-width:700px;
  margin:auto;
}
button{
  padding:10px 16px;
  font-size:16px;
  margin-top:10px;
}
.sliders{
  margin-bottom:14px;
}
.result{
  margin-top:20px;
  padding:15px;
  background:#f3f3f3;
  border-radius:8px;
}
</style>

</head>

<body>

<h1>🏌️ Streamlight — Season Pass Optimizer</h1>

<div class="sliders">
  <label>Expected rounds per year: <strong id="rounds-value">30</strong></label><br>
  <input type="range" id="rounds" min="0" max="120" value="30" style="width:220px;">
</div>
<div class="sliders">
  <label>Cart usage: <strong id="cart-value">50</strong>%</label><br>
  <input type="range" id="cart" min="0" max="100" value="50" style="width:220px;">
</div>
<div class="sliders">
  <label>Twilight rounds: <strong id="twilight-value">10</strong>%</label><br>
  <input type="range" id="twilight" min="0" max="50" value="10" style="width:220px;">
</div>
<div class="sliders">
  <label>Practice sessions per week: <strong id="practice-value">0</strong></label><br>
  <input type="range" id="practice" min="0" max="7" value="0" style="width:220px;">
</div>
<div class="sliders">
  <label>Range bucket size:</label><br>
  <select id="range-bucket">
    <option value="small">Small</option>
    <option value="medium" selected>Medium</option>
    <option value="large">Large</option>
  </select>
</div>

<div id="chart"></div>
<div id="output" class="result"></div>

<script type="module" src="app.js"></script>

</body>

</html>
