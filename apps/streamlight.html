<!doctype html>
<html>

<head>
<meta charset="utf-8">
<title>Streamlight Prototype</title>

<!--  LOAD D3 FIRST -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body{
  font-family:system-ui;
  padding:40px;
  max-width:700px;
  margin:auto;
}
button{
  padding:10px 16px;
  font-size:16px;
  margin-top:10px;
}
.result{
  margin-top:20px;
  padding:15px;
  background:#f3f3f3;
  border-radius:8px;
}
</style>

</head>

<body>

<h1>🏌️ Streamlight — Season Pass Optimizer</h1>

<label>Rounds by category:</label><br>
<div id="rounds-by-category"></div>
<p id="rounds-total" style="margin-top:8px;font-weight:bold;"></p>

<br><br>

<button onclick="calculate()">
Calculate Best Option
</button>

<div id="output" class="result"></div>

<script>

// Pricing by category (weekday, weekend, twilight, etc.) — categories come from data
let costsByCategory = [];
const CART_USAGE = 0.5;

// LOAD CSV: rows are course, category, green_fee, cart_fee
d3.csv("rounds_cost.csv").then(raw=>{
  const rows = raw.map(d=>({
    course: d.course,
    category: d.category,
    green: +d.green_fee,
    cart: +d.cart_fee
  }));

  costsByCategory = d3.groups(rows, d => d.category);
  const categories = costsByCategory.map(([cat]) => cat);
  console.log("Costs by category:", costsByCategory);

  // Build rounds-by-category inputs (extensible: one input per category in data)
  const container = document.getElementById("rounds-by-category");
  container.innerHTML = "";
  categories.forEach(cat => {
    const label = document.createElement("label");
    label.textContent = cat + ": ";
    const input = document.createElement("input");
    input.type = "number";
    input.min = 0;
    input.value = cat === "weekday" ? 12 : cat === "weekend" ? 8 : 5;
    input.id = "rounds-" + cat;
    input.style.width = "60px";
    input.style.marginRight = "12px";
    input.addEventListener("input", updateRoundsTotal);
    container.appendChild(label);
    container.appendChild(input);
  });
  updateRoundsTotal();
});

function updateRoundsTotal() {
  const total = getRoundsByCategory().total;
  const el = document.getElementById("rounds-total");
  if (el) el.textContent = "Total rounds: " + total;
}

// Read rounds per category from DOM (one input per category; extensible)
function getRoundsByCategory() {
  const byCat = {};
  let total = 0;
  document.querySelectorAll("[id^='rounds-']").forEach(input => {
    const cat = input.id.replace("rounds-", "");
    const n = Math.max(0, +input.value || 0);
    byCat[cat] = n;
    total += n;
  });
  return { byCat, total };
}

// =========================
// CALCULATE (category-based)
// =========================
function calculate() {
  if (!costsByCategory.length) {
    alert("Pricing not loaded yet");
    return;
  }

  const { byCat: roundsByCategory, total: totalRounds } = getRoundsByCategory();
  if (totalRounds === 0) {
    document.getElementById("output").innerHTML = "<p>Enter at least one round.</p>";
    return;
  }

  // Per-category average round cost (green + cart * usage), then weighted paygo
  let paygo = 0;
  costsByCategory.forEach(([category, rows]) => {
    const avgRound = d3.mean(rows, d => d.green + d.cart * CART_USAGE);
    const rounds = roundsByCategory[category] || 0;
    paygo += rounds * avgRound;
  });

  const coursePass = 850;
  const allInclusive = 720;

  const plans = [
    { plan: "Pay As You Go", cost: paygo },
    { plan: "Course Pass", cost: coursePass },
    { plan: "All Inclusive", cost: allInclusive }
  ];

  plans.forEach(p => {
    p.costPerRound = p.cost / totalRounds;
  });

  plans.sort((a, b) => a.cost - b.cost);
  const best = plans[0];

  const rows = plans.map((p, i) => `
<tr style="
  background:${i === 0 ? "#dff5e1" : "white"};
  font-weight:${i === 0 ? "bold" : "normal"};
">
<td>${p.plan}</td>
<td>$${p.cost.toFixed(0)}</td>
<td>$${p.costPerRound.toFixed(2)}</td>
</tr>
`).join("");

  document.getElementById("output").innerHTML = `
<h3>Best Option: ✅ ${best.plan}</h3>

<table border="1" cellpadding="8"
style="border-collapse:collapse;margin-top:10px;">
<tr>
<th>Plan</th>
<th>Total Cost</th>
<th>Cost / Round</th>
</tr>
${rows}
</table>
`;
}

</script>

</body>
</html>
